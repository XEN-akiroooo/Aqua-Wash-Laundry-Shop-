<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      flex-direction: row;
      background-color: #DDFFFF;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px; 
      min-width: 60px;
      background: linear-gradient(to bottom, #2B58CC, #7B2BCC);
      color: white;
      padding: 2rem 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* Collapsed state */
    .sidebar.collapsed {
      width: 70px;
      padding: 2rem 0.5rem;
    }

    /* Transition for child elements */
    .sidebar .header,
    .sidebar .section-title,
    .sidebar .divider,
    .sidebar .btn,
    .sidebar .footer {
      transition: all 0.2s ease-in-out;
    }

    /* Hide text elements when collapsed */
    .sidebar.collapsed .header,
    .sidebar.collapsed .section-title,
    .sidebar.collapsed .divider {
      opacity: 0;
      visibility: hidden;
      height: 0;
      margin: 0;
      pointer-events: none;
    }

    /* Toggle Button - Fixed Positioning */
    .toggle-btn {
      position: absolute;
      right: -18px;
      top: 50px;
      background: #7B2BCC;
      color: white;
      border: 2px solid #DDFFFF;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1000;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
    }

    .sidebar.collapsed .toggle-btn {
      right: -18px; /* Maintain position relative to sidebar edge */
    }

    /* Three-Dot Handle for collapsed view */
    .sidebar .three-dots {
      display: none;
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
    }

    .sidebar.collapsed .three-dots {
      display: flex;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
    }

    .header {
      font-size: 1.8rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 2rem;
      -webkit-text-stroke: 1px #1800AD;
      color: white;
      letter-spacing: 1px;
      overflow: hidden;
      white-space: nowrap;
    }

    .section-title {
      text-align: center;
      font-weight: bold;
      margin: 1rem 0;
      opacity: 0.9;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
    }

    .divider {
      height: 2px;
      background: rgba(255,255,255,0.4);
      margin: 1rem 0;
    }

    /* BUTTONS */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      margin: 0.5rem 0;
      border-radius: 16px;
      border: 4px solid transparent;
      color: white;
      font-weight: bold;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      white-space: normal;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* Circular buttons when collapsed */
    .sidebar.collapsed .btn {
      width: 45px;
      height: 45px;
      min-height: 45px;
      font-size: 0; /* Hide text */
      border-radius: 50%;
      margin: 0.5rem auto;
      border-width: 2px;
    }

    /* Colors */
    .btn.shop { background: #2093DD; border-color: #1B67AD; }
    .btn.control { background: #E16CF0; border-color: #BA1DB8; }
    .btn.account { background: #1E6CE2; border-color: #1D52BA; }

    .btn.active {
      box-shadow: 0 0 12px white;
      transform: scale(1.02);
    }

    .footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* MAIN CONTENT */
    .main {
      flex: 1;
      background: radial-gradient(circle, #d9faff, #ffffff);
      padding: 2rem;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-title {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, #1e90ff, #00c3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      width: 100%;
    }

    .card {
      flex: 1 1 300px;
      max-width: 400px;
      padding: 2rem;
      border-radius: 2rem;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal.show { display: flex; }

    .modal-box {
      background: white;
      padding: 2.5rem;
      border-radius: 2rem;
      text-align: center;
      width: 90%;
      max-width: 350px;
    }

    .modal button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.8rem;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .green { background: #00c853; color: white; }
    .red { background: #d50000; color: white; }

    @media (max-width: 768px) {
      .sidebar { position: fixed; height: 100%; left: -260px; }
      .sidebar.active { left: 0; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>

  <div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">&lt;</div>

    <div class="three-dots" onclick="toggleSidebar()">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="header">DASHBOARD</div>

    <div class="section-title">SHOP'S OVERVIEW</div>
    <button class="btn shop" onclick="setActive(this)">Daily Operations Overview</button>
    <button class="btn shop" onclick="setActive(this)">Financial Statements</button>
    <button class="btn shop" onclick="setActive(this)">Key Performance Metrics</button>
    <button class="btn shop" onclick="setActive(this)">Business Management</button>

    <div class="divider"></div>

    <div class="section-title">CONTROLS</div>
    <button class="btn control" onclick="setActive(this)">INPUT OR CONSOLE</button>
    <button class="btn control" onclick="setActive(this)">SERVICE SETTINGS</button>

    <div class="footer">
      <button class="btn account">ACCOUNT SETTINGS</button>
      <button class="btn account" onclick="openModal()">LOG OUT</button>
    </div>
  </div>

  <div class="main" id="main">
    <div class="top-title">AQUA WASH LAUNDRY SHOP</div>

    <div class="cards">
      <div class="card">
        <h3>ADD SERVICE ORDER</h3>
        <p>Form elements here...</p>
      </div>

      <div class="card">
        <h3>PREVIEW</h3>
        <p>Live summary...</p>
      </div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <p>Do you really want to log out? 🤔</p>
      <button class="green">Log out anyway</button>
      <button class="red" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script>
    function setActive(btn) {
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const toggleBtn = document.querySelector('.toggle-btn');
      
      sidebar.classList.toggle('collapsed');
      
      if (sidebar.classList.contains('collapsed')) {
        toggleBtn.innerHTML = '>'; 
      } else {
        toggleBtn.innerHTML = '<'; 
      }
    }

    function openModal() { document.getElementById('modal').classList.add('show'); }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
  </script>

</body>
</html>
