<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: linear-gradient(to bottom, #2B58CC, #7B2BCC);
      color: white;
      padding: 20px;
      transition: 0.3s;
      position: relative;
    }

    .sidebar.collapsed {
      width: 0;
      padding: 0;
      overflow: hidden;
    }

    .header {
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .back-btn {
      cursor: pointer;
      font-size: 20px;
    }

    .section-title {
      text-align: center;
      font-weight: bold;
      margin: 15px 0;
      opacity: 0.9;
    }

    .divider {
      height: 2px;
      background: rgba(255,255,255,0.4);
      margin: 15px 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 25px;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .blue { background: linear-gradient(to right, #2DA8FF, #005BFF); }
    .pink { background: linear-gradient(to right, #FF4FD8, #A800FF); }
    .solid-blue { background: #1E6DFF; }

    .btn.active {
      border: 3px solid white;
      box-shadow: 0 0 10px white;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 80%;
    }

    /* MAIN */
    .main {
      flex: 1;
      background: radial-gradient(circle, #d9faff, #ffffff);
      padding: 20px;
      transition: 0.3s;
    }

    .top-title {
      text-align: center;
      font-size: 28px;
      color: #1e90ff;
      margin-bottom: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 50px;
    }

    .card {
      width: 350px;
      padding: 20px;
      border-radius: 40px;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: white;
      padding: 30px;
      border-radius: 30px;
      text-align: center;
      width: 300px;
    }

    .modal button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 20px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .green { background: linear-gradient(to right, #00c853, #00e676); color: white; }
    .red { background: linear-gradient(to right, #d50000, #8e0000); color: white; }

    /* HAMBURGER */
    .hamburger {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      cursor: pointer;
      display: none;
    }

    .show {
      display: flex !important;
    }

    /* MOBILE RESPONSIVE FIX */
@media (max-width: 768px) {

  body {
    flex-direction: column;
    overflow: auto;
  }

  /* Sidebar becomes scrollable */
  .sidebar {
    width: 100%;
    height: auto;
    position: relative;
    overflow-y: auto;
  }

  /* Footer fix (no longer fixed bottom) */
  .footer {
    position: relative;
    width: 100%;
    margin-top: 20px;
  }

  /* Main takes full width */
  .main {
    width: 100%;
    padding: 10px;
  }

  /* Stack cards vertically */
  .cards {
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
  }

  .card {
    width: 95%;
    border-radius: 25px;
  }

  /* Smaller title */
  .top-title {
    font-size: 20px;
  }

  /* Buttons spacing fix */
  .btn {
    font-size: 14px;
    padding: 8px;
  }

  /* Show hamburger always on mobile */
  .hamburger {
    display: block;
  }
}

  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="header">
      DASHBOARD
      <span class="back-btn" onclick="toggleSidebar()">←</span>
    </div>

    <div class="section-title">SHOP'S OVERVIEW</div>
    <button class="btn blue" onclick="setActive(this)">Daily Operations Overview</button>
    <button class="btn blue" onclick="setActive(this)">Financial Statements</button>
    <button class="btn blue" onclick="setActive(this)">Key Performance Metrics</button>
    <button class="btn blue" onclick="setActive(this)">Business Management</button>

    <div class="divider"></div>

    <div class="section-title">CONTROLS</div>
    <button class="btn pink" onclick="setActive(this)">INPUT OR CONSOLE</button>
    <button class="btn pink" onclick="setActive(this)">SERVICE SETTINGS</button>

    <div class="footer">
      <button class="btn solid-blue">ACCOUNT SETTINGS</button>
      <button class="btn solid-blue" onclick="openModal()">LOG OUT</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="top-title">AQUA WASH LAUNDRY SHOP</div>

    <div class="cards">
      <div class="card">
        <h3>ADD SERVICE ORDER</h3>
        <p>Form elements here...</p>
      </div>

      <div class="card">
        <h3>PREVIEW</h3>
        <p>Live summary...</p>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <p>Do you really want to log out? 🤔</p>
      <button class="green">Log out anyway</button>
      <button class="red" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script>
    function setActive(btn) {
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const hamburger = document.querySelector('.hamburger');

      sidebar.classList.toggle('collapsed');
      hamburger.style.display = sidebar.classList.contains('collapsed') ? 'block' : 'none';
    }

    function openModal() {
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }
  </script>

</body>
  </html>
