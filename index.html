<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      flex-direction: row;
      background-color: #DDFFFF;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      min-width: 60px;
      background: linear-gradient(to bottom, #2B58CC, #7B2BCC);
      color: white;
      padding: 2rem 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .sidebar.collapsed {
      width: 60px;
      padding: 2rem 0.5rem;
    }

    .sidebar .header,
    .sidebar .section-title,
    .sidebar .divider,
    .sidebar .btn,
    .sidebar .footer {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .sidebar.collapsed .header,
    .sidebar.collapsed .section-title,
    .sidebar.collapsed .divider,
    .sidebar.collapsed .btn:not(.collapsed-btn),
    .sidebar.collapsed .footer {
      opacity: 0;
      transform: translateX(-20px);
      pointer-events: none;
    }

    .sidebar.collapsed .btn {
      width: 40px;
      height: 40px;
      font-size: 0;
      border-radius: 50%;
      margin: 0.5rem auto;
    }

    .toggle-btn {
      position: absolute;
      right: -18px;
      top: 50px;
      background: #7B2BCC;
      color: white;
      border: 2px solid #DDFFFF;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1000;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      transition: right 0.3s;
    }

    .sidebar.collapsed .toggle-btn {
      right: 18px;
    }

    /* DASHBOARD TEXT WITH STROKE */
    .header {
      font-size: 2rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      margin-top: 10px;
      -webkit-text-stroke: 1px #1800AD;
      color: white;
      letter-spacing: 1px;
    }

    .section-title {
      text-align: center;
      font-weight: bold;
      margin: 1rem 0;
      opacity: 0.9;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
    }

    .divider {
      height: 2px;
      background: rgba(255,255,255,0.4);
      margin: 1rem 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 50px;
      margin: 0.5rem 0;
      border-radius: 16px;
      border: 6px solid transparent;
      color: white;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn.shop { background: #2093DD; border-color: #1B67AD; }
    .btn.control { background: #E16CF0; border-color: #BA1DB8; }
    .btn.account { background: #1E6CE2; border-color: #1D52BA; }
    .btn.active { box-shadow: 0 0 10px white; }

    .footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* MAIN */
    .main {
      flex: 1;
      background: radial-gradient(circle, #d9faff, #ffffff);
      padding: 1rem;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-title {
      text-align: center;
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #1e90ff, #00c3ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      width: 100%;
    }

    .card {
      flex: 1 1 300px;
      max-width: 400px;
      padding: 1rem;
      border-radius: 2rem;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-box {
      background: white;
      padding: 2rem;
      border-radius: 2rem;
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .modal button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      border-radius: 1rem;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .green { background: linear-gradient(to right, #00c853, #00e676); color: white; }
    .red { background: linear-gradient(to right, #d50000, #8e0000); color: white; }

    .hamburger {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 1.5rem;
      cursor: pointer;
      display: none;
      z-index: 10;
    }

    .show { display: flex !important; }

    @media (max-width: 900px) {
      body { flex-direction: column; }
      .sidebar { position: fixed; height: 100%; z-index: 5; }
      .main { margin-left: 0; }
      .hamburger { display: flex; }
    }

    @media (max-width: 600px) {
      .top-title { font-size: 1.5rem; }
      .card { flex: 1 1 90%; max-width: none; }
      .btn { font-size: 12px; }
    }
  </style>
</head>

<body>
  <div class="sidebar" id="sidebar">
    <div class="toggle-btn" onclick="toggleSidebar()">&#10094;</div>

    <div class="header">DASHBOARD</div>

    <div class="section-title">SHOP'S OVERVIEW</div>
    <button class="btn shop" onclick="setActive(this)">Daily Operations Overview</button>
    <button class="btn shop" onclick="setActive(this)">Financial Statements</button>
    <button class="btn shop" onclick="setActive(this)">Key Performance Metrics</button>
    <button class="btn shop" onclick="setActive(this)">Business Management</button>

    <div class="divider"></div>

    <div class="section-title">CONTROLS</div>
    <button class="btn control" onclick="setActive(this)">INPUT OR CONSOLE</button>
    <button class="btn control" onclick="setActive(this)">SERVICE SETTINGS</button>

    <div class="footer">
      <button class="btn account">ACCOUNT SETTINGS</button>
      <button class="btn account" onclick="openModal()">LOG OUT</button>
    </div>
  </div>

  <div class="main" id="main">
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="top-title">AQUA WASH LAUNDRY SHOP</div>

    <div class="cards">
      <div class="card">
        <h3>ADD SERVICE ORDER</h3>
        <p>Form elements here...</p>
      </div>
      <div class="card">
        <h3>PREVIEW</h3>
        <p>Live summary...</p>
      </div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <p>Do you really want to log out? 🤔</p>
      <button class="green">Log out anyway</button>
      <button class="red" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script>
    function setActive(btn) {
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const toggleBtn = document.querySelector('.toggle-btn');
      sidebar.classList.toggle('collapsed');
      toggleBtn.innerHTML = sidebar.classList.contains('collapsed') ? '&#10095;' : '&#10094;';
    }

    function openModal() { document.getElementById('modal').classList.add('show'); }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
  </script>
</body>
</html>
